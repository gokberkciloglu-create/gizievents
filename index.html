<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gizi events</title>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: radial-gradient(circle at 30% 30%, #6e7f96, #3e4b5c);
      overflow-x: hidden;
      color: #dfe6ed;
    }

    .velvet {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent);
      mix-blend-mode: overlay;
      pointer-events: none;
      transition: 0.2s;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .logo {
      font-size: 90px;
      letter-spacing: 8px;
      color: #cfd7df;
      text-shadow:
        inset 0 2px 4px rgba(0,0,0,0.4),
        0 6px 12px rgba(0,0,0,0.4);
      opacity: 0.9;
    }

    .sub {
      font-size: 16px;
      letter-spacing: 4px;
      opacity: 0.6;
    }

    .section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px 40px;
      border-radius: 40px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="velvet" id="velvet"></div>

<section class="hero">
  <div class="logo">gizi</div>
  <div class="sub">events & more</div>
</section>

<section class="section">
  <div class="card">Gamze's Bachelorette</div>
</section>

<script>
  const velvet = document.getElementById("velvet");

  document.addEventListener("mousemove", (e) => {
    let x = e.clientX / window.innerWidth * 100;
    let y = e.clientY / window.innerHeight * 100;

    velvet.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.15), transparent)`;
  });
</script>

</body>
</html>

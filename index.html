<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Cormorant Garamond", serif;
  background: linear-gradient(135deg, #6f8096, #4b5c73);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: #e6edf5;
}

/* kadife hissi */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 40%);
  mix-blend-mode: soft-light;
  pointer-events: none;
}

/* baloncuk */
.bubble {
  padding: 18px 40px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: 0.3s;
}

.bubble:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.15);
}

.bubble-text {
  font-size: 22px;
  letter-spacing: 1px;
}

/* alt logo */
.footer {
  position: absolute;
  bottom: 40px;
  text-align: center;
  width: 100%;
}

.footer h1 {
  font-size: 42px;
  margin: 0;
  opacity: 0.9;
}

.footer p {
  margin: 0;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="bubble">
  <div class="bubble-text">Gamze’s Bachelorette Weekend</div>
</div>

<div class="footer">
  <h1>gizi</h1>
  <p>events & more</p>
</div>

</body>
</html>

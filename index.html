<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Cormorant Garamond", serif;
}

/* ARKA PLAN KATMANLARI */
.bg {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: 2s ease;
}

.bg1 {
  background-image: url("fur1.png");
  z-index: 1;
}

.bg2 {
  background-image: url("fur2.png");
  z-index: 2;
  opacity: 0;
  filter: blur(10px);
  transform: scale(1.05);
}

/* BALONLAR */
.container {
  position: relative;
  z-index: 3;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  opacity: 0;
}

.bubble {
  padding: 14px 28px;
  border-radius: 999px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(20,30,60,0.9);
  font-size: 22px;
  cursor: pointer;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.25);

  transform: scale(0.7);
  opacity: 0;
}

/* ŞİŞME ANİMASYONU */
@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); }
}

/* MODAL (AYNI) */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  position: relative;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- ARKA PLAN -->
<div class="bg bg1"></div>
<div class="bg bg2"></div>

<!-- BALONLAR -->
<div class="container" id="container">
  <div class="bubble">Gamze’s Bachelorette</div>
  <div class="bubble">Zeynep’s Bridal Shower</div>
  <div class="bubble">Elif’s Engagement Party</div>
  <div class="bubble">Ayşe’s Henna Night</div>
  <div class="bubble">Derya’s Welcome Party</div>
</div>

<script>

/* 1️⃣ Tüy geçişi */
setTimeout(() => {
  const bg2 = document.querySelector(".bg2");
  bg2.style.opacity = "1";
  bg2.style.filter = "blur(0)";
  bg2.style.transform = "scale(1)";
}, 800);

/* 2️⃣ Balonlar gelsin */
setTimeout(() => {
  const container = document.getElementById("container");
  container.style.opacity = "1";

  const bubbles = document.querySelectorAll(".bubble");

  bubbles.forEach((b, i) => {
    setTimeout(() => {
      b.style.animation = "pop 0.6s ease forwards";
    }, i * 150);
  });

}, 2200);

</script>

</body>
</html>

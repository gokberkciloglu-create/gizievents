<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
}

/* LOADING SCREEN */
.loader {
  position: fixed;
  inset: 0;
  background: #0f1a2b;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.8s ease;
}

.loader h1 {
  color: white;
  font-size: 32px;
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeIn 1.2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* MAIN */
body {
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("bg-desktop.png") center/cover no-repeat;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* BALON */
.bubble {
  padding: 14px 28px;
  border-radius: 999px;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(30,42,68,0.9);
  font-size: 22px;
  cursor: pointer;
  text-align: center;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.25);

  transition: 0.3s;
}

.bubble:hover {
  transform: scale(1.04);
  background: rgba(255,255,255,0.14);
}

.bubble:active {
  transform: scale(0.96);
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    background: url("bg-mobile.png") center/cover no-repeat;
    align-items: flex-start;
    padding-top: 26vh;
  }

  .bubble {
    font-size: 20px;
    padding: 13px 22px;
    max-width: 82%;
    background: rgba(255,255,255,0.07);
  }
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  position: relative;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loader" id="loader">
  <h1>gizi</h1>
</div>

<div class="container">
  <div class="bubble" onclick="openModal('gamze.html','gamze123')">Gamze’s Bachelorette</div>
  <div class="bubble" onclick="openModal('zeynep.html','Ilovegoko123')">Zeynep’s Bridal Shower</div>
  <div class="bubble" onclick="openModal('elif.html','Ilovegoko123')">Elif’s Engagement Party</div>
  <div class="bubble" onclick="openModal('ayse.html','Ilovegoko123')">Ayşe’s Henna Night</div>
  <div class="bubble" onclick="openModal('derya.html','Ilovegoko123')">Derya’s Welcome Party</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✕</div>
    <h3>Şifre Gir</h3>
    <input type="password" id="password">
    <button onclick="checkPassword()">Giriş</button>
    <div class="error" id="error"></div>
  </div>
</div>

<script>
let currentPage = "";
let currentPassword = "";

/* LOADING */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
    }, 800);
  }, 1200);
});

function openModal(page, password) {
  currentPage = page;
  currentPassword = password;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("password").value = "";
  document.getElementById("error").innerText = "";
}

function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === currentPassword) {
    window.location.href = currentPage;
  } else {
    document.getElementById("error").innerText = "Yanlış şifre";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Cormorant Garamond", serif;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
}

.bg1 {
  background-image: url("fur1.png");
  z-index: 1;
}

.bg2 {
  background-image: url("fur2.png");
  z-index: 2;
  opacity: 0;
  filter: blur(10px);
  transform: scale(1.05);
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 3;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: opacity .7s ease, transform .7s ease;
}

.container.show {
  opacity: 1;
}

.container.zoom-out {
  transform: scale(1.06);
  opacity: 0;
}

/* BALON */
.bubble {
  position: relative;
  overflow: hidden;

  width: 260px;
  text-align: center;

  padding: 14px 20px;
  border-radius: 999px;

  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(20,30,60,0.9);
  font-size: 22px;
  cursor: pointer;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.25);

  opacity: 0;
  transform: scale(0.7);

  transition: 0.28s;
}

.bubble.visible {
  opacity: 1;
  transform: scale(1);
}

/* FLOAT */
.bubble.float {
  animation: float 3.4s ease-in-out infinite;
}

@keyframes float {
  0% { margin-top: 0; }
  50% { margin-top: -6px; }
  100% { margin-top: 0; }
}

/* POP */
@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* SHIMMER */
.bubble::after {
  content: "";
  position: absolute;
  top: -40%;
  left: -70%;
  width: 55%;
  height: 180%;
  background: linear-gradient(115deg, transparent, rgba(255,255,255,0.5), transparent);
  transform: rotate(12deg);
  opacity: 0;
}

.bubble.shimmer::after {
  animation: shimmer 1.2s ease;
}

@keyframes shimmer {
  0% { left: -70%; opacity: 0; }
  30% { opacity: .8; }
  100% { left: 120%; opacity: 0; }
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    justify-content: flex-start;
    padding-top: 26vh;
  }

  .bubble {
    width: 80%;
    max-width: 300px;
    font-size: 20px;
  }
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(0,0,0,0.28);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(22px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
}

.close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 999px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="container" id="container">
  <div class="bubble" onclick="openModal('gamze.html','gamze123')">Gamze’s Bachelorette</div>
  <div class="bubble" onclick="openModal('zeynep.html','Ilovegoko123')">Zeynep’s Bridal Shower</div>
  <div class="bubble" onclick="openModal('elif.html','Ilovegoko123')">Elif’s Engagement Party</div>
  <div class="bubble" onclick="openModal('ayse.html','Ilovegoko123')">Ayşe’s Henna Night</div>
  <div class="bubble" onclick="openModal('derya.html','Ilovegoko123')">Derya’s Welcome Party</div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✕</div>
    <h3>Şifre Gir</h3>
    <input type="password" id="password">
    <button onclick="checkPassword()">Giriş</button>
    <div class="error" id="error"></div>
  </div>
</div>

<script>
let currentPage = "";
let currentPassword = "";

/* GIZI DAHA HIZLI */
setTimeout(() => {
  const bg2 = document.querySelector(".bg2");
  bg2.style.opacity = "1";
  bg2.style.filter = "blur(0)";
  bg2.style.transform = "scale(1)";
}, 300);

/* BALONLAR DAHA ERKEN */
setTimeout(() => {
  const container = document.getElementById("container");
  const bubbles = document.querySelectorAll(".bubble");

  container.classList.add("show");

  bubbles.forEach((b, i) => {
    setTimeout(() => {
      b.style.animation = "pop 0.6s ease forwards";

      setTimeout(() => {
        b.classList.add("visible");
        b.classList.add("float");
      }, 600);

      setTimeout(() => {
        b.classList.add("shimmer");
      }, 800);

    }, i * 150);
  });

}, 2500);

/* ŞİFRE */
function openModal(page, password) {
  currentPage = page;
  currentPassword = password;
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === currentPassword) {
    window.location.href = currentPage;
  } else {
    document.getElementById("error").innerText = "Yanlış şifre";
  }
}
</script>

</body>
</html>

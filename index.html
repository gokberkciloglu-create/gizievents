<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
}

body {
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("bg-desktop.png") center/cover no-repeat;
  -webkit-tap-highlight-color: transparent;
}

/* BALON */
.bubble {
  padding: 16px 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(30,42,68,0.9);
  font-size: 24px;
  cursor: pointer;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  body {
    background: url("bg-mobile.png") center/cover no-repeat;
    align-items: flex-start;
    padding-top: 26vh;
  }

  .bubble {
    font-size: 22px;
    padding: 14px 24px;
    max-width: 82%;
    background: rgba(255,255,255,0.07);
  }
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bubble" onclick="openModal()">
  Gamze’s Bachelorette Weekend
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Şifre Gir</h3>
    <input type="password" id="password" placeholder="Şifre">
    <button onclick="checkPassword()">Giriş</button>
    <div class="error" id="error"></div>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "gamze123") {
    window.location.href = "gamze.html";
  } else {
    document.getElementById("error").innerText = "Yanlış şifre";
  }
}
</script>

</body>
</html>

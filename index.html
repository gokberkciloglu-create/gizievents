<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #5c6f88, #2f3f54);
  overflow: hidden;
  color: #e6edf5;
}

/* KADİFE EFEKTİ */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,0.1), transparent 40%);
  mix-blend-mode: soft-light;
  pointer-events: none;
}

/* ORTA BALON */
.bubble {
  position: absolute;
  top: 40%;
  transform: translateY(-50%);
  padding: 20px 50px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
  transition: 0.3s;
}

.bubble:hover {
  transform: translateY(-50%) scale(1.08);
  background: rgba(255,255,255,0.15);
}

.bubble-text {
  font-size: 24px;
  letter-spacing: 1px;
}

/* ALT LOGO */
.footer {
  position: absolute;
  bottom: 40px;
  text-align: center;
  width: 100%;
}

.footer h1 {
  font-size: 48px;
  margin: 0;
  opacity: 0.9;
}

.footer p {
  margin: 0;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="bubble">
  <div class="bubble-text">Gamze’s Bachelorette Weekend</div>
</div>

<div class="footer">
  <h1>gizi</h1>
  <p>events & more</p>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("bg-desktop.png") center/cover no-repeat;
}

/* BALON */
.bubble {
  padding: 16px 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.20); /* %20 şeffaflık */
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.35);
  color: white;
  font-size: 24px;
  transition: 0.3s;
}

/* MOBİL */
@media (max-width: 768px) {

  body {
    background: url("bg-mobile.png") center/cover no-repeat;
    align-items: flex-start;
    padding-top: 28vh;
  }

  .bubble {
    font-size: 22px;
    padding: 14px 24px; /* biraz küçüldü */
    max-width: 85%;
    text-align: center;
    background: rgba(255,255,255,0.16); /* daha şeffaf */
  }
}
</style>
</head>

<body>

<div class="bubble">
  Gamze’s Bachelorette Weekend
</div>

</body>
</html>

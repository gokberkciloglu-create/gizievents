<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>gizi events</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: "Cormorant Garamond", serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;

      /* ARKA PLAN */
      background-image: url("fur-bg.png");
      background-size: cover;
      background-position: center;
    }

    /* ÜST IŞIK */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent 40%);
      pointer-events: none;
    }

    /* BALON */
    .bubble {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 50px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 26px;
      transition: 0.3s;
    }

    .bubble:hover {
      transform: translateX(-50%) scale(1.05);
    }

    /* ALT LOGO */
    .footer {
      position: absolute;
      bottom: 60px;
      text-align: center;
      width: 100%;
    }

    .footer h1 {
      font-size: 80px;
      margin: 0;
      text-shadow: 0 10px 30px rgba(255,255,255,0.3);
    }

    .footer p {
      margin: 0;
      font-size: 22px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="bubble">
  Gamze’s Bachelorette Weekend
</div>

<div class="footer">
  <h1>gizi</h1>
  <p>events & more</p>
</div>

</body>
</html>

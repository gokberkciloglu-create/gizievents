<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Cormorant Garamond", serif;

  display: flex;
  justify-content: center;
  align-items: center;

  /* DESKTOP ARKA PLAN */
  background: url("bg-desktop.png") center bottom / contain no-repeat;
  background-color: #dbe6f5;
}

/* BALON */
.bubble {
  padding: 16px 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.20);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.35);
  color: white;
  font-size: 24px;
  text-align: center;
  transition: 0.3s;
}

/* HOVER (sadece bilgisayar) */
@media (hover: hover) {
  .bubble:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.30);
  }
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  body {
    background: url("bg-mobile.png") center bottom / contain no-repeat;
    background-color: #dbe6f5;

    align-items: flex-start;
    padding-top: 28vh;
  }

  .bubble {
    font-size: 22px;
    padding: 14px 24px;
    max-width: 85%;
    background: rgba(255,255,255,0.16);
  }
}
</style>
</head>

<body>

<div class="bubble">
  Gamze’s Bachelorette Weekend
</div>

</body>
</html>

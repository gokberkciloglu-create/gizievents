<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
}

body {
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("bg-desktop.png") center center / cover no-repeat;
  overflow: hidden;
}

.bubble {
  padding: 16px 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.32);
  color: white;
  font-size: 24px;
  text-align: center;
  transition: 0.3s;
}

@media (hover: hover) {
  .bubble:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.24);
  }
}

@media (max-width: 768px) {
  body {
    background: url("bg-mobile.png") center center / cover no-repeat;
    align-items: flex-start;
    padding-top: 26vh;
  }

  .bubble {
    font-size: 22px;
    padding: 14px 24px;
    max-width: 82%;
    background: rgba(255,255,255,0.13);
  }
}
</style>
</head>
<body>

<div class="bubble">Gamze’s Bachelorette Weekend</div>

</body>
</html>

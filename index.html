<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
}

body {
  font-family: "Cormorant Garamond", serif;
  display: flex;
  justify-content: center;
  align-items: center;

  /* DESKTOP BACKGROUND */
  background: url("bg-desktop.png") center center / cover no-repeat;
}

/* 💎 BALON (FINAL) */
.bubble {
  padding: 16px 38px;
  border-radius: 999px;

  /* ŞEFFAFLIK */
  background: rgba(255,255,255,0.14);

  /* CAM EFEKTİ */
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.25);

  /* YAZI */
  color: rgba(30, 42, 68, 0.9);
  font-size: 24px;
  text-align: center;

  /* GÖLGE */
  box-shadow:
    0 8px 25px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.25);

  transition: 0.3s;
}

/* 💻 HOVER (desktop only) */
@media (hover: hover) {
  .bubble:hover {
    transform: scale(1.04);
    background: rgba(255,255,255,0.18);

    box-shadow:
      0 12px 35px rgba(0,0,0,0.12),
      0 4px 12px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  body {
    background: url("bg-mobile.png") center center / cover no-repeat;
    align-items: flex-start;
    padding-top: 26vh;
  }

  .bubble {
    font-size: 22px;
    padding: 14px 24px;
    max-width: 82%;

    /* DAHA ŞEFFAF */
    background: rgba(255,255,255,0.10);
  }
}
</style>
</head>

<body>

<div class="bubble">
  Gamze’s Bachelorette Weekend
</div>

</body>
</html>

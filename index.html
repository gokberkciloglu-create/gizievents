<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gizi events</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Cormorant Garamond", serif;
  background: url("fur-bg.png") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BALON */
.bubble {
  padding: 18px 42px;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  font-size: 24px;
  text-align: center;
  transition: 0.3s;
}

/* HOVER sadece desktop */
@media (hover: hover) {
  .bubble:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.35);
  }
}

/* 📱 MOBİL AYAR */
@media (max-width: 768px) {
  body {
    align-items: flex-start;
    padding-top: 30vh;
  }

  .bubble {
    font-size: 20px;
    padding: 16px 22px;
    max-width: 85%;
  }
}
</style>
</head>

<body>

<div class="bubble">
  Gamze’s Bachelorette Weekend
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamze</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Cormorant Garamond", serif;
  background: url("bg-mobile.png") center/cover no-repeat;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 42px;
}

/* SECTION */
.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  text-align: center;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Gamze’s Bachelorette 💎</h1>
</div>

<div class="section">
  <div class="card">
    <h2>21 June</h2>
    <p>Bodrum</p>
  </div>
</div>

<div class="section">
  <div class="card">
    <h2>Dress Code</h2>
    <p>White & Champagne</p>
  </div>
</div>

<script>
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;

    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
